# ==========================================
# Alacritty コピペ・QOL爆上がり設定
# ==========================================

# 1. クリップボードの強制同期設定
# 選択したテキストを自動的にシステムのクリップボードにもコピーします
[selection]
save_to_clipboard = true

# 2. キーバインドの設定
# Windowsやブラウザと全く同じ感覚で Ctrl+C / Ctrl+V が使えるようにします
[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
# コピーを実行した後に、notify-sendコマンドで右上に通知を出す
# さらに、クリップボードの先頭15文字を切り取って通知に含めるようにしています
chars = "\u0003" # Ctrl+Shift+Cの標準的な挙動
command = { program = "sh", args = ["-c", "alacritty msg action Copy && notify-send 'Alacritty' \"Copied: $(xclip -o -selection clipboard | head -c 15)...\""] }

