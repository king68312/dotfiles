# ==========================================
# Alacritty コピペ・QOL爆上がり設定
# ==========================================

# 1. クリップボードの強制同期設定
# 選択したテキストを自動的にシステムのクリップボードにもコピーします
[selection]
save_to_clipboard = true

# 2. キーバインドの設定
# Windowsやブラウザと全く同じ感覚で Ctrl+C / Ctrl+V が使えるようにします
[[keyboard.bindings]]
key = "C"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"
